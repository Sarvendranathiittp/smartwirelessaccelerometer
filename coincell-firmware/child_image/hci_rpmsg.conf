# ============================================
# Network Core (hci_rpmsg) — Power Optimized
# ============================================

# BLE Controller Config
CONFIG_BT_MAX_CONN=1
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_TX_COUNT=10
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_RX_COUNT=10

# Reduce TX power: -8 dBm (sufficient for <5m lab use)
CONFIG_BT_CTLR_TX_PWR_MINUS_8=y

# Disable all logging/serial on network core
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_LOG=n
CONFIG_PRINTK=n
CONFIG_BOOT_BANNER=n
