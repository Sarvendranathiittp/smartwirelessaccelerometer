# ============================================
# ISRO Accelerometer - Rev 21 (HW Timer Pipeline)
# ============================================

# 1. Core System
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# System clock — 1 kHz tick is fine; NRF_TIMER1 is used for exact sampling
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
CONFIG_TICKLESS_KERNEL=y

# nrfx HAL RTC support (LFCLK-based, replaces TIMER1 for massive power savings)
CONFIG_NRFX_RTC0=y
# nrfx TIMER for high-frequency sampling (2-5 kHz) — uses 16 MHz HFCLK
CONFIG_NRFX_TIMER=y

# 2. Power — DCDC regulators only. NO device runtime PM.
# CONFIG_PM_DEVICE_RUNTIME was causing the I2C bus to be silently suspended
# between pm_device_runtime_put/get calls, causing I2C reads to fail.
CONFIG_REGULATOR=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y

# 3. Logging (ENABLED temporarily for debugging)
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_PRINTK=y
CONFIG_BOOT_BANNER=n
CONFIG_NCS_BOOT_BANNER=n
CONFIG_ASSERT=n
CONFIG_ASSERT_VERBOSE=n

# 4. SPI Configuration
CONFIG_SPI=y
CONFIG_I2C=n
CONFIG_SENSOR=n

# 5. Bluetooth Core
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="ISRO_AccelSensor_nRF"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_GATT_NOTIFY_MULTIPLE=y

# BLE Throughput
CONFIG_BT_DATA_LEN_UPDATE=y
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_L2CAP_TX_MTU=251
CONFIG_BT_USER_PHY_UPDATE=y
CONFIG_BT_ATT_TX_COUNT=10
CONFIG_BT_CONN_TX_MAX=10
CONFIG_BT_BUF_EVT_RX_COUNT=20
CONFIG_BT_L2CAP_TX_BUF_COUNT=10
CONFIG_BT_BUF_ACL_TX_COUNT=10

# 7. Settings (BLE bonding storage)
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# 8. Hardware
CONFIG_FPU=n
CONFIG_CRC=y
CONFIG_CLOCK_CONTROL=y
CONFIG_CLOCK_CONTROL_NRF=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y

# 9. Optimization
CONFIG_SPEED_OPTIMIZATIONS=y
CONFIG_PICOLIBC=y

# 10. Battery Service & ADC Configuration
CONFIG_BT_BAS=y
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y
