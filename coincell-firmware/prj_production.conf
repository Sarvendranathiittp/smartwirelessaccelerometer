# ============================================
# ISRO Accelerometer - Rev 17 PRODUCTION
# Coin Cell Optimized (Logging/UART Disabled)
# ============================================
# Use: west build -b nrf5340dk/nrf5340/cpuapp -- -DCONF_FILE=prj_production.conf
#
# Identical to prj.conf EXCEPT:
#   - Logging/UART/Console disabled (saves ~4 mA by allowing HFCLK gating)
#   - DK LEDs disabled (saves ~1-5 mA per LED)
#   - Assertions disabled (saves code size)
#
# Target: < 100 µA idle, ~1 mA streaming

# ==========================
# Core System Configuration
# ==========================
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_PRIORITY=-1
CONFIG_ASSERT=n

# System Clock (10 kHz tick rate for 100µs resolution)
CONFIG_SYS_CLOCK_TICKS_PER_SEC=10000

# ==========================
# LOGGING DISABLED (saves ~4 mA by allowing HFCLK to gate!)
# ==========================
CONFIG_LOG=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_SERIAL=n

# ==========================
# Bluetooth Core
# ==========================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="ISRO_AccelSensor_nRF"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_DEVICE_APPEARANCE=0

# ==========================
# GATT Configuration
# ==========================
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_ATT_PREPARE_COUNT=5
CONFIG_BT_GATT_NOTIFY_MULTIPLE=y
CONFIG_BT_GATT_CLIENT=y

# ==========================
# BLE MTU and Buffer Sizes
# ==========================
CONFIG_BT_L2CAP_TX_MTU=251
CONFIG_BT_BUF_ACL_TX_SIZE=255
CONFIG_BT_BUF_ACL_RX_SIZE=255
CONFIG_BT_ATT_TX_COUNT=10
CONFIG_BT_CONN_TX_MAX=10

# Buffer counts
CONFIG_BT_BUF_EVT_RX_COUNT=20
CONFIG_BT_L2CAP_TX_BUF_COUNT=10

# BLE Data Length Extension (DLE)
CONFIG_BT_DATA_LEN_UPDATE=y
CONFIG_BT_USER_PHY_UPDATE=y
CONFIG_BT_USER_DATA_LEN_UPDATE=y

# ==========================
# BLE Connection Parameters
# ==========================
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=100

# ==========================
# Settings (Persistent Storage)
# ==========================
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# ==========================
# DK LEDs DISABLED (saves power)
# ==========================
CONFIG_DK_LIBRARY=n
CONFIG_GPIO=y

# ==========================
# Float & CRC Support
# ==========================
CONFIG_FPU=y
CONFIG_NEWLIB_LIBC=y
CONFIG_CRC=y

# ==========================
# I2C Driver
# ==========================
CONFIG_I2C=n

# ==========================
# Power Management
# ==========================
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y

# ==========================
# Low Power Optimizations
# ==========================
CONFIG_IDLE_STACK_SIZE=256
CONFIG_TICKLESS_KERNEL=y
CONFIG_BOOT_BANNER=n

# ==========================
# Battery Service & ADC Configuration
# ==========================
CONFIG_BT_BAS=y
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y
