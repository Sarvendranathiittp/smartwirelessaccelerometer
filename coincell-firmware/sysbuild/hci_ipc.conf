# Network core (hci_ipc) configuration for nRF5340
# Enables 251-byte Data Length Extension, 2M PHY, and TX power control

# Data Length Extension (DLE) for 239-byte packets
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_TX_COUNT=3
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_EVT_RX_COUNT=10

# Dynamic TX Power Control (allows runtime changes via HCI VS commands)
CONFIG_BT_CTLR_TX_PWR_DYNAMIC_CONTROL=y

