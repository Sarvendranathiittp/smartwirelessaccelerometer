# ============================================
# ISRO ESB Receiver (PRX) — Network Core
# ============================================

# ESB Protocol
CONFIG_ESB=y
CONFIG_ESB_MAX_PAYLOAD_LENGTH=252

# Clock Control (required for ESB HF clock)
CONFIG_CLOCK_CONTROL=y

# System
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=2048

# CRC for packet integrity
CONFIG_CRC=y

# Logging via RTT (not UART to avoid interfering with binary stream)
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n

# High-speed UART for streaming binary data to PC
CONFIG_UART_INTERRUPT_DRIVEN=y
