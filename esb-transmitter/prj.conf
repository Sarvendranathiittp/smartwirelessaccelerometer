# =============================================================================
# ISRO ESB Telemetry — Network Core (PTX) — Power-Optimized Build
# Target: ≤ 500 µA average at VDD=3.0V with 1024 Hz sampling intact
# =============================================================================

# ── ESB Radio Protocol ──────────────────────────────────────────────────────
CONFIG_ESB=y
# Payload limit: 248 bytes (40 samples × 6B + 8B header). ESB max is 252.
CONFIG_ESB_MAX_PAYLOAD_LENGTH=252

# ── Clock Control ───────────────────────────────────────────────────────────
# Required by ESB library to request/release HFCLK via Zephyr onoff manager.
CONFIG_CLOCK_CONTROL=y

# ── System Resources ────────────────────────────────────────────────────────
# FIX: was 2048. Main thread needs ~400B stack (local packet buffer + SPI bufs).
# 1024 saves 1 KB of SRAM retention current (~0.1-0.2 µA, but every bit counts).
CONFIG_MAIN_STACK_SIZE=1024

# FIX: was 1024. Firmware uses zero dynamic allocation (no k_malloc anywhere).
# An unused 1 KB heap pool wastes SRAM retention and adds heap-init boot code.
CONFIG_HEAP_MEM_POOL_SIZE=0

# ── SPI Driver ──────────────────────────────────────────────────────────────
# Zephyr SPI driver for init-time register writes (h3lis331dl_write_reg /
# h3lis331dl_read_reg). The hot-path h3lis331dl_read_accel_raw() bypasses
# the driver and writes SPIM0 ENABLE register directly to eliminate ~30 µs
# of PM framework overhead per sample (pinctrl + mutex + state machine).
CONFIG_SPI=y

# ── Device Power Management ─────────────────────────────────────────────────
# PM_DEVICE: enables pm_device_action_run() used by init-time SPI functions.
# FIX: PM_DEVICE_RUNTIME was set but serves no purpose here — the hot path
# uses bare register writes, not pm_device_runtime_put_async(). Remove runtime
# to eliminate background PM work queue thread activity.
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=n

# Zephyr system-level power management (CPU sleep state selection).
# Distinct from PM_DEVICE (peripheral PM). With CONFIG_PM=y, Zephyr's idle
# thread selects the deepest allowed CPU sleep state, coordinating with the
# SOC's power domains. Combined with SCB SLEEPDEEP=1 set in main(), this
# enables deep sleep between every RTC0 tick.
CONFIG_PM=y

# ── RTC0 Hardware Timer ──────────────────────────────────────────────────────
# nrfx HAL for direct RTC0 register access. Used for the 1024 Hz sample timer
# (LFCLK-based, exact: 32768/32 = 1024 Hz with zero drift).
CONFIG_NRFX_RTC0=y

# ── CRC ─────────────────────────────────────────────────────────────────────
# CRC-16/CCITT used for per-packet integrity check at receiver.
CONFIG_CRC=y

# ── Logging ─────────────────────────────────────────────────────────────────
# PRODUCTION build: all logging DISABLED.
CONFIG_LOG=n
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_USE_SEGGER_RTT=n
CONFIG_LOG_BACKEND_RTT=n
CONFIG_PRINTK=n
CONFIG_BOOT_BANNER=n

# ── Network Core Instruction Cache ───────────────────────────────────────────
# The nRF5340 network core has a 2 KB instruction cache. Disabling it saves
# ~10-15 µA of SRAM retention current. At 1024 Hz with frequent context
# switches, the cache miss rate is moderate but the power saving exceeds
# any performance benefit (CPU active time is already minimized).
CONFIG_NRF_ENABLE_CACHE=n

# =============================================================================
# CRITICAL POWER OPTIMIZATIONS — SOC WORKAROUND OVERRIDES
# =============================================================================

# Anomaly 160 workaround:
# This Nordic errata prevents WFI from entering sleep if it has been entered
# more than 5 times in 200 µs (prevents DCDC switching instability during
# rapid on/off cycles). At 1024 Hz, WFI is called ~1024 times/sec, hitting
# this threshold constantly — the workaround would spin-wait instead of sleep.
# SAFE TO DISABLE: The anomaly only affects DCDC regulator startup. Our DCDC
# is configured once by the app core at boot and stays enabled permanently;
# the network core does not start/stop DCDC, so it cannot trigger the anomaly.
CONFIG_SOC_NRF53_ANOMALY_160_WORKAROUND_NEEDED=n

# RTC Pretick mechanism:
# This mechanism requires IPC cooperation: the network core sends a "pretick"
# message to the app core, which must run a handler to advance its RTC and
# respond. Without the matching handler on the app core, the pretick check
# always times out and blocks WFI entry entirely — the CPU never sleeps!
# SAFE TO DISABLE: We use sysbuild with SB_CONFIG_APPCORE_EMPTY=y, so the
# app core runs our custom empty_app_core firmware that does NOT include the
# pretick handler. Without the handler, pretick is broken; disabling it is
# required for WFI to work.
CONFIG_SOC_NRF53_RTC_PRETICK=n
